name: BuildAgain

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    name: Build CoreProtect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        # Using 'package' ensures the Shade plugin runs 
        # but avoids the 'install' profile that might delete the jar.
        run: mvn -B package -DskipTests

      - name: List files for debugging
        # This helps you see exactly what was built if the upload fails
        run: ls -R target/

      - name: Upload CoreProtect Jar
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-Build
          # Matches <artifactId>CoreProtect</artifactId> from your pom.xml
          path: target/CoreProtect-*.jar
          if-no-files-found: error
